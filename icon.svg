<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1016"/>
      <stop offset="1" stop-color="#1c1d28"/>
    </linearGradient>
    <linearGradient id="pic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38e07b"/>
      <stop offset="1" stop-color="#ffcb47"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9ccd6"/>
      <stop offset="0.5" stop-color="#9aa0af"/>
      <stop offset="1" stop-color="#7f8493"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="96" y="96" width="320" height="320" rx="40" fill="url(#pic)"/>
  <text x="256" y="300" font-size="200" text-anchor="middle" font-family="serif">🎯</text>
  <!-- foil tiles partly scratched away (top-left covered) -->
  <g fill="url(#foil)" stroke="rgba(0,0,0,0.15)" stroke-width="2">
    <rect x="98" y="98" width="78" height="78" rx="8"/>
    <rect x="178" y="98" width="78" height="78" rx="8"/>
    <rect x="98" y="178" width="78" height="78" rx="8"/>
    <rect x="338" y="338" width="76" height="76" rx="8"/>
  </g>
</svg>
